name: freshbasket

services:
  web:
    build: .
    image: freshbasket
    container_name: freshbasket-container
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: redis-container
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  
  celery:
    image: freshbasket
    container_name: celery-container
    command: celery -A config worker -E -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - web

volumes:
  redis-data: